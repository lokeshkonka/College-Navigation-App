<style>
        .clay-card {
            background: #ffffff;
            box-shadow: 0px 20px 40px rgba(43, 52, 56, 0.06), 
                        inset 4px 4px 8px rgba(255, 255, 255, 0.8),
                        inset -4px -4px 10px rgba(221, 228, 230, 0.5);
        }
        .clay-inset {
            background: #dbe4ea;
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.05),
                        inset -2px -2px 4px rgba(255, 255, 255, 0.8);
        }
        .clay-button {
            background: linear-gradient(180deg, #586062 0%, #4c5456 100%);
            box-shadow: 0px 10px 20px rgba(88, 96, 98, 0.2),
                        inset 2px 2px 4px rgba(255, 255, 255, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background font-body text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-[#f8f9fb]/70 backdrop-blur-xl rounded-b-[2rem] shadow-[0px_20px_40px_rgba(0,0,0,0.06)]">
<div class="flex items-center gap-4">
<button class="text-[#586062] active:scale-95 duration-200 ease-in-out hover:bg-[#ffffff] p-2 rounded-full transition-all">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-extrabold tracking-tighter text-[#586062] text-lg">Tactile Cartographer</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden shadow-sm">
<img class="w-full h-full object-cover" data-alt="professional headshot of a young male student with friendly expression in soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCyRCpl0kcizU2as92Hsv2ntEn8NHJODOIpiHxLxneaUBTCogPlqPdyjvpcnIroP_ikA0hb_O3uSBU1DXd32eZHG_f1DILJatTEqzjwjc3Pi8rb2Dgr_NnyuL9P9XxnqU77qrfJy4EFZSUVz9SERPT3h28ZntHvnSQ_tz5VcVrEVLTa0vkVjVGGEEWI2nFG63Ys4L_pfAL7dD1cj9aqk-DRCDQ2zWPFdHJ9nfBGQbekN10LS3JeA_40UROYIFJ-hkJ9-jqQ5whO3Fph"/>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow pt-28 pb-32 px-6 max-w-2xl mx-auto w-full">
<!-- Header Section -->
<section class="mb-10 text-center">
<h2 class="text-3xl font-headline font-extrabold tracking-tight text-primary mb-2">Share your experience</h2>
<p class="text-on-surface-variant font-medium">Your insights help us map a better campus for everyone.</p>
</section>
<!-- Feedback Form -->
<div class="space-y-8">
<!-- Category Segment Picker -->
<div class="bg-surface-container-highest p-1.5 rounded-full flex gap-1 shadow-inner">
<button class="flex-1 py-3 px-4 rounded-full text-sm font-bold bg-white text-tertiary shadow-sm transition-all duration-300">
                    General
                </button>
<button class="flex-1 py-3 px-4 rounded-full text-sm font-bold text-on-surface-variant hover:text-primary transition-all">
                    Report Map Error
                </button>
<button class="flex-1 py-3 px-4 rounded-full text-sm font-bold text-on-surface-variant hover:text-primary transition-all">
                    Suggestion
                </button>
</div>
<!-- Rating Selector -->
<div class="clay-card rounded-lg p-6 flex flex-col items-center gap-4">
<span class="text-xs font-bold uppercase tracking-widest text-outline">How would you rate your route?</span>
<div class="flex gap-4">
<button class="w-12 h-12 flex items-center justify-center rounded-full text-surface-variant hover:text-tertiary transition-colors active:scale-90">
<span class="material-symbols-outlined text-4xl" data-icon="sentiment_very_dissatisfied">sentiment_very_dissatisfied</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full text-surface-variant hover:text-tertiary transition-colors active:scale-90">
<span class="material-symbols-outlined text-4xl" data-icon="sentiment_dissatisfied">sentiment_dissatisfied</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full text-surface-variant hover:text-tertiary transition-colors active:scale-90">
<span class="material-symbols-outlined text-4xl" data-icon="sentiment_neutral">sentiment_neutral</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full text-tertiary transition-colors active:scale-90">
<span class="material-symbols-outlined text-4xl" data-icon="sentiment_satisfied" style="font-variation-settings: 'FILL' 1;">sentiment_satisfied</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full text-surface-variant hover:text-tertiary transition-colors active:scale-90">
<span class="material-symbols-outlined text-4xl" data-icon="sentiment_very_satisfied">sentiment_very_satisfied</span>
</button>
</div>
</div>
<!-- Text Area -->
<div class="space-y-3">
<label class="px-4 text-xs font-bold uppercase tracking-widest text-outline">Describe your experience</label>
<div class="clay-inset rounded-lg p-1">
<textarea class="w-full bg-transparent border-none focus:ring-0 p-5 text-primary font-medium placeholder:text-outline-variant resize-none" placeholder="Type your feedback here..." rows="5"></textarea>
</div>
</div>
<!-- Attach Photo & Submit Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<button class="clay-card rounded-full py-4 px-6 flex items-center justify-center gap-3 text-primary font-bold active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="add_a_photo">add_a_photo</span>
                    Attach Photo
                </button>
<button class="clay-button rounded-full py-4 px-6 text-white font-extrabold tracking-wide active:scale-95 transition-transform flex items-center justify-center gap-2">
                    Submit Feedback
                    <span class="material-symbols-outlined text-xl" data-icon="send">send</span>
</button>
</div>
</div>
<!-- Featured Map Snippet (Contextual background) -->
<div class="mt-12 opacity-50 grayscale pointer-events-none">
<div class="clay-card rounded-lg overflow-hidden h-32 relative">
<img class="w-full h-full object-cover" data-alt="minimalist clean map layout of a university campus with soft green pathways and white buildings" data-location="London" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZrFHRXMYsZddT4wY_I7VmRseYUPbYZy150UzqbfJbTaIXwUU9t1Q4wvaQ6OUfMIlNM8QtBoqlifsloZBOX91OYmDfH6alp_KTs0eode2ce4zudxN_AErLOU7C1YsdYuBSXQ6mVxUxnQaycfI4iMmvEKcDMA4cbQlCeQzxkz_crkiyIqXIHlJ6djJ0tyQ9t7ztVd0HGbI9X8B9_uy_Vi4HsHH6EB4egO-cMMNbzwQtauktopEku3gNt0t9vHlfTxcTwl-uaqACVwK4"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 px-8 pb-8 flex justify-around items-center bg-[#ffffff]/80 backdrop-blur-2xl">
<div class="flex justify-around items-center w-full max-w-md mx-auto relative h-20">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-[#586062] opacity-60 hover:opacity-100 transition-opacity active:scale-90" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider mt-1">Home</span>
</a>
<!-- Map -->
<a class="flex flex-col items-center justify-center text-[#586062] opacity-60 hover:opacity-100 transition-opacity active:scale-90" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="map">map</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold uppercase tracking-wider mt-1">Map</span>
</a>
<!-- Profile (Active) -->
<a class="flex flex-col items-center justify-center bg-[#006c56] text-white rounded-full w-14 h-14 shadow-lg active:scale-90 transition-transform duration-300 -mt-6" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
</a>
</div>
</nav>
</body></html>
